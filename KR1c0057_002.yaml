body:
  text: 詩説卷中密雲知縣惠周惕撰其風肆好風之義也風自火出家人關雎之義也觀風之所被君子知及物之理焉求風之所自君子悟反身之學焉葛覃之詩曰曷浣曷否歸寧父母言女子之適人者有省父母之禮也泉水蝃蝀竹竿之詩曰女子有行逺父母兄弟言女子之適人者不得復省其父母兄弟也兩者抵牾如此而春秋左氏傳曰凡諸侯之女歸寧曰來趙匡曰諸侯之女既嫁父母存則歸寧不然則否穀梁傳曰婦人既嫁不踰竟踰竟非禮也又各自為説如此而毛氏傳詩以為后妃之父母在故得歸衛女之父母不在故不得歸其在與不在無論荒逺不可據就令可據則詩止言逺兄弟可已何以并及父母而一再言之不已也且昏禮昏義亦當載歸寧一條著其儀節云何如納采問名納吉納徵請期親迎之類不應詳于未昏之前而略于既昏之後如此其疏脫也愚嘗求之孔子之意而知歸寧之説非也於何知之於春秋知之春秋莊二十七年冬書杞伯姬來左氏曰歸寧也杜氏曰莊公女也莊公在而伯姬來則正與歸寧之禮合而春秋何以書而譏之以此知歸寧之説非也不寧惟是春秋桓三年書齊侯送薑氏於歡莊二十七年公會把伯姬於洮皆譏也齊僖于薑氏魯莊于伯姬父子也父之于子猶不可送焉會焉况女之來歸於父母乎以此知歸寧之説非也然則后妃亦非禮乎曰此毛傳之誤非詩意也序曰葛覃后妃之本也后妃在父母家志在女功之事躬儉節用尊敬師傅可以歸寧父母云云蓋以其為女知其能為婦所謂無父母詒罹者也公羊傳曰婦人謂嫁曰歸是也序説自長而毛傳因左氏誤馬非詩之意然也諸家之論惟穀梁氏為知禮也夫趙匡曰譏無父母而來也蓋謂伯姬桓公女也杜氏先于趙必有所據矣汪氏曰伯姬叔姬若皆桓公女則伯姬三十餘矣未應二女皆失時若是且伯姬以僖三十一年來求婦則年踰七十而猶至魯未可必其為桓公女也又六國時左師觸龍曰媪之送燕后也持其踵為之泣祭祀必祝之祝曰必勿使返六國時且然而况文武之世乎桃之花後於梅而詩以興男女之及時梅之花先於桃而詩以興昏姻之後時何也夫婦之道在生育猶草木之美在果實也桃後梅而花反先梅而實故曰有蕡其實言桃有實則成樹猶夫婦有子則成家也若頃筐塈之則過時而美盡其育不繁矣易曰枯楊生華何可久也老婦士夫亦可醜也人臣之於公也勞則於私也必逸蓋心思智力盡之乎君而家無事焉故曰退食自公委蛇委蛇言無私營無私交也不然張湯之造請諸公無間寒暑有終日矻矻而不暇者矣何委蛇之有士昏禮主人爵辨纁裳從車二乘婦車亦如之昏義壻親迎之後出御婦車而壻授綏御輪三周故曰之子于歸言秣其馬言得如是之女歸于我則我將親迎而身御之愛之深不覺詞之眤也不言御車而言秣馬欲速其行且微其詞也又左傳有返馬之文鄭詩有同車之語故漢廣以秣馬秣駒為言若箋言禮餼則納徵無用馬者詩人言此亦贅矣詩疑問曰儀禮鄉飲酒射燕禮皆合樂二南六詩召南曰鵲巢采蘩采蘋不及草蟲何歟朱氏發其端而未有解請得而臆對之鵲巢言夫人有均一之德佐君以造邦也采蘩言奉祭祀不失職也采蘋言循法度以承先供祭也婦德之大莫大于事宗廟循法度佐君子故婦順備而內和理內和理而後家可長久也鄉射燕飲取三詩歌之宜也若草蟲則言始見君子之事昏禮所謂主人揖婦以入御袵席於奧之時也始曰我心降再曰我心説又曰我心夷其言近於褻矣牀笫之言不踰閾况可歌之君臣賓客之前乎坊記曰子云禮非祭男女不交爵以此坊民陽侯猶殺繆侯而竊其夫人故大享廢夫人之禮詩之不歌草蟲蓋坊民之微旨也問者曰然則召南有淫詩歟曰不然序言能以禮自防則樂而不淫者也舊謂草蟲在采蘋後此徒以篇什先後言且未可考也野有死麕序謂惡無禮也傳曰凶荒則禮殺猶有物以將之野有死麕羣田之獲而分其肉疏曰禮雖殺須有物以將之故欲得用麕肉也如此則詩人所言甚為有禮而序何言惡無禮乎且吾未聞昏禮之用麕肉也按史記有司言古者皮幣諸侯以聘享逺方用幣煩費不省乃以白鹿皮方尺緣以藻繢為皮幣直四十萬朝覲聘享必以皮幣薦璧然後得行則古之行禮有幣必有皮也故士昏禮納徵玄纁束帛儷皮如納吉禮注謂執束帛以致命兩皮為庭實皮鹿皮則納吉納徵皆有皮幣皮以鹿皮也又昏禮摯不用死帛必可制今曰死麕則不中禮之皮矣曰白茅包之則不中禮之皮而又苟簡將之矣非禮而求昏有誘之道焉故曰吉士誘之也林有朴􅈪野有死鹿言死鹿之不成皮猶朴􅈪之不成林也女惡之而不從故曰白茅純束有女如玉言束者不可解白者不可玷也劉昫唐書志曰平王東遷諸侯侮法男女失冠昏之節野麕之刺興豈因下何彼穠矣之詩亦疑此詩為東遷時作耶何彼穠矣明言平王而舊説以為武王安城劉氏引棫朴之辟王文王有聲之稱王后江漢之稱文人以實之蓋昔人誤認二南為文王時詩故曲説羡言先後承襲若此不知二南之詩非一時所作有自其前而追詠之者有從其後而附益之者如甘棠行露為思慕召伯則非作于召伯在位之日矣何彼穠矣安知非編詩者録入耶周室既微而王姬下嫁尚循婦道則關雎鵲巢之化及於後者逺而被于人者深矣於是美而附之召南所以教天下之婦道也春秋書王姬歸諸侯一在莊元年為齊襄公一在十一年為齊桓公二者未知孰是竊以肅雍之義求之疑是歸桓公者春秋莊十一年書王姬歸于齊傳曰齊侯來逆共姬共固美諡又與肅雍之意合也儀禮賈疏引鄭針膏肓言齊侯嫁女以其母王姬始嫁之車逺送之未知何據恐是采齊魯韓三家説也單襄公曰旱麓之榛楛殖故君子得以易樂干祿焉若夫山林匱竭林鹿散亡藪澤肆既君子將險哀之不暇而何易樂之有傳曰天地變化草木蕃天地閉賢人隱故彼茁者葭美王道之成也何草不黃知周室之衰也一繫二南之終一繫小雅之末其旨微矣邶鄘先衛魏先唐或曰不與衛晉之滅國也然檜滅於鄭何以不先於鄭且晉之滅魏左氏傳有之衛之滅邶鄘吾不知其何所據也今讀其詩皆衛國之事而山川土風亦無不同邶詩曰亦流於淇鄘曰送我淇上衛亦曰瞻彼淇澳在彼淇梁鄘詩曰在彼中河邶曰河水瀰瀰衛亦曰河水洋洋誰謂河廣俱非鄰封異域也季札觀樂歌邶鄘衛曰吾聞衛康叔武公之德如是不更言邶鄘何如也又鄘詩所謂沫鄉即酒誥所謂沫邦沫正康叔始封之地而詩言云然則邶鄘故商之諸侯武王滅之以封康叔者也邶鄘既滅衛之名邑尚仍其舊故以所作詩繫之夫子亦仍其舊而不改也漢書地理志周既滅殷分其畿內為三國鄁以封紂子武庚庸管叔尹之衛蔡叔尹之謂之三監武王崩三監畔周公誅之盡以其地封弟康叔此又謂周公滅邶鄘蓋據書傳以成王封康叔故也然書傳之説蔡氏於康誥辨之詳已張氏曰邶鄘衛其音類也故季札觀樂歌邶鄘衛則合之歌魏歌唐則别之歌鄭歌檜則逺之别之可也逺之義則鑿矣燕生子則委巢為戴媯比也燕燕鳩知雨則逐婦為棄婦詠也氓之三章鶯聞音則鳴和為朋友言也伐木鸇性善飛得風而逝譬賢者之見幾決也晨風隼性專一擇木而巢教使臣之行止慎也四牡三章鳩無戾天之翼言亂政之治難期也小宛隼無一定之棲言訛言之息無時也沔水風作而雨隨之夫婦之象也風生而雨益之朋友之義也然風甚者雨止雨甚者風息故夫婦有相棄乖其和也朋友不能終過其節也此風雅所以皆取興於谷風也弼風誰謂荼苦大雅堇荼如飴一謂之苦一謂之甘物性土宜何以相異如是按堇有二種爾雅曰齧注謂堇葵即內則堇豆枌榆之堇曰芨注謂烏頭即晉語驪姬置鴆于酒置堇于肉之堇荼有三種一苦菜一茅秀有女如荼是也一陸草以薅荼蓼是也茅秀陸草不可食風雅所謂堇荼明非烏頭茅秀陸草而皆可食矣士虞禮夏用葵冬用荁注堇類也爾雅荼苦菜注引詩誰謂荼苦本草荼一名選一名遊冬易緯通卦驗玄圖云苦采生於寒秋則知荼與堇同時而生同時而食故詩人以二物並舉也然爾雅於堇荼俱言苦而本草獨言董味甘邢昺爾雅疏則謂古人語倒堇之言苦猶甘草謂之大苦則堇之味甘可知堇荼同類不應堇甘而荼獨苦也竊嘗深求弼風詩人之意荼本不苦而謂之苦猶已本不惡而謂之惡愛憎之情乖美惡之形變也昔人誤解弼風郭璞因弼風誤注爾雅幾疑雅詩所言乃是抵讕置詞亦可一笑矣孔疏謂周原土地之美物之苦者亦甘遂以烏頭釋堇信如孔説將使鴆生於周亦不殺人者耶苦堇堇草爾雅分别言之亦不容混也陸璣詩疏荼苦菜生山田及澤中得霜甜脆而美亦一證蝃蝀在東隂方之氣交於陽為女惑男而蠱朝隮於西陽方之氣交於隂為男先女而咸故得雨則虹滅隂陽和也先女則不淫男女正也序曰止奔此之謂也詩美王姬則曰平王之孫齊侯之子美莊薑則曰齊侯之子衛侯之妻美韓侯則曰汾王之孫蹶父之子永嘉陳氏曰君子善善之意不惟及其身而又及其親也余謂詩人之意不止此蓋有重婚姻别姓氏之義焉周幽王得褒姒而黜申后衛宣公為子娶於齊而自為則昏姻亂矣聃叔娶于鄭晉獻娶於賈魯昭娶於吳則姓氏不辨矣惟為明著其所自來曰此某氏之男某氏之女則顯然有卑不得配尊賤不得配貴同姓不得通昏姻之義此詩人之微旨春秋之筆法也故太史公作外戚傳惟竇太后曰良家子餘則曰生微曰故倡曰母臧兒其亦詩人之意也夫左傳衛莊公娶於齊東宫得臣之妹曰莊薑美而無子衛人所為賦碩人也序亦謂莊公惑於嬖妾使驕上僭莊薑賢而不答終以無子則碩人之詩所以憂無子而受制嬖妾非徒詠其美而賢也其三章曰碩人敖敖説於農郊所以弗無子也月令仲春祠髙禖焦喬謂髙禖祠在南郊仲春往祠值農事之興故曰農郊也孔子之生尚禱尼山則諸侯之祠髙禖禮未必禁也既祠而歸諸大夫皆望莊薑之有子故曰大夫夙退無使君勞也如是而無子則嬖妾之寵固州吁之禍成矣其四章曰河水洋洋北流活活猶白華之刺幽后而言滮池北流也曰施罛濊濊鱣鮪發發葭菼揭揭言葭菼擢則鱣鮪依有罛無所施猶莊公嬖則賤妾張有法不能制也程子曰活活激流貌葭菼衆多貌孽孽不順貌施罛不安強大之魚不能制也蓋得詩人之微旨矣左傳衛宣公蒸於夷薑生急子注謂宣公庶母也先是莊公娶於齊曰莊薑矣又娶於陳曰厲媯戴媯矣吾不知夷薑為莊薑之娣耶抑更娶於齊者耶傳何以不詳也又曰為急子娶於齊而美公取之是為宣薑今新臺之詩是也生夀及朔夷薑縊宣薑與公子朔構急子而使盜殺之莘夀竊急子之旌以先亦見殺今二子乘舟之詩是也衛莊之沒不見春秋而州吁之亂宣公尚在邢也州吁殺而宣公立在魯隱公四年其卒也在桓公十二年則宣公在位才十九年耳即位而蒸夷薑必踰年而後生子及子之可娶也計已十五六年矣宣薑之生夀及朔又必更歷二三年至宣公之卒朔猶在襁褓而能與其母構急子耶夀長於朔僅一二年而能載其旌以越竟耶計急夀之死當在公子朔即位之後不然急子之譖獨宣薑為之而惠公不知也魯史記事或得於赴告或得於傳聞隱公初年未與衛親記事容有不核者未可知也左傳惠公之即位也少杜言年十五六蓋未詳考也次王於衛傷周也衛懿公滅於翟而廬漕周幽王滅於戎而東遷甚矣周之似衛也然衛有文公之賢而國家再造周自此不復振焉重傷平王也彼黍離離彼稷之苗初以離離者為黍矣而不知實稷也憂思之深黍稷不能辨也蓼蓼者莪匪莪伊蒿初以蓼蓼者為莪矣而不知實蒿也哀痛之至莪蒿有時眩也平王東遷申侯遷之也何言乎申侯申侯構西戎以入周諸侯不與也諸侯不與則申危故遷王近申以自固也何以知諸侯之不與也楊之水曰彼其之子不與我戌申是也董卓之將築郿塢也遷帝於長安曹操之將篡漢室也遷帝於許下申侯之意其曹董之智也歟周之東遷君臣銜膽棲氷之日也乃有執簧執翿以為樂者何哉呼曰君子著其位以責之也曰陽陽本其心以刺之也樂憂者憂必及之翟難所以復作也葛蔓而善緣也采葛讒言之中人善類之獲免者寡矣苓甘而易入也采苓讒言之饞人君子之不茹者鮮矣故臭香亂蘭艾不能保其馨焉喜怒易則甘苦有時失其味焉彼留子嗟傳謂留大夫氏按説文留從卯户開為卯卯為春門户闔為酉酉為秋門則留自從卯卯為酉之省文董逌據此謂留不從卯漢人言卯金刀者緯書之附會也許氏以劉為鎦其轉為劉以田易刀也董氏又謂漢姓自當為鎦或為留豈古文從省留與劉通用耶後世留異又謂系出留侯何耶左傳士會歸晉其處者為劉氏然周大夫有食采於劉者豈又其别系耶周故有劉氏而詩言留子則許氏董氏之説未為無據也傳謂子嗟留子字子國留子父其言則近於鑿嗟者語助國者食邑也留仕於周故有采地也小星詩維參與昴傳曰昴留也陸氏音義昴一名留蓋古讀昴為留故蕭尤等韻通用也朱子釋詩據夾漈之説凡於鄭風小序刺時刺忽閔亂之作力詆其謬改為淫奔之詩其言亦辨而正然不知鄭國之亂在君臣風俗之淫猶其小者也三十年中公子五爭弒奪數見既立昭公又立厲公已而厲公見逐昭公入即弒昭公而立子亹子亹殺於齊而子儀立子儀立十四年又弒之而納厲公易君竄國等於兒戲君臣之變未有甚於鄭者豈區區淫亂之罪足以蔽其辜哉朱子欲絶鄭而實寬其大惡亦弗思矣衛俗之淫也鄭聲之淫也今以事迹之衛宣之惡亘古未有鄭則無是也自朱子指斥鄭詩其惡幾浮於衛固已輕重失倫矣至金華王魯齋則又取衛黜鄭削去鄭詩十一首尤近於僭矣彼見雄雉引於論語淇澳引於大學而鄭獨不然是以取此黜彼固哉髙叟之為詩也敝笱序謂魯桓微弱不能防間文薑朱子改桓為莊誤也夫之能禁其妻不猶愈於子之能禁其母乎春秋桓十八年公會齊侯於濼公與夫人薑氏遂如齊則薑氏之淫亂桓公實導之故曰齊子歸止其從如雲隱然桓公亦在從之之內矣且南山刺齊襄猗嗟刺魯莊而桓公反無一詞及焉豈理也哉猗嗟之詠魯莊也先辨其長短次審其睂目終得其趨蹌步武彎弓執矢之狀非親見而還觀之不能詳悉如是是為魯莊適齊時作可知也按莊九年公及齊大夫盟於蔇是時桓公尚未立也十三年春與齊侯會於北杏冬又盟於柯十五年又會於鄄皆未至齊也二十一年夫人薑氏薨二十二年始如齊納幣二十三年知齊觀社莊公如齊惟此以意求之當在納幣之年蓋文薑薨之明年也公以嘉禮往齊國人聚觀固其恆情而又親見文薑昔年淫亂疑其類於襄公於是注目諦觀知其非是而始恍然曰展我甥兮則人言藉藉從此衰止其詩之有關於魯莊者大矣儉非惡德而魏以之亡國何哉蓋儉之極者必貪伐檀碩鼠之所以作也國小民貧掊克不已安得不亡晉言唐從乎封地也左傳子産曰當武王邑薑方娠太叔夢帝謂已余命而子曰虞將與之唐屬之參而繁育其子孫及成王滅唐而封太叔故號太叔為唐叔而命以唐誥也國語叔向曰昔先君唐叔射兕於徒林殪以為太甲以封於晉則晉之名晉自唐叔時已然矣史記晉世家以子燮因晉水改唐為晉蓋史遷時左傳未行故亦不見外傳宜其言云爾而後人至今仍之何也詩總聞曰子燮諡晉非晉號也自唐叔至靖侯五世史不載年數不知何時為晉當是以燮諡為號晉美名也唐侯諡晉衛侯名晉則晉者其後創起之名王質説詩穿鑿類如此尤不足據也敬爾威儀所以昭其文也弗曳弗婁則下民易之矣修爾戎兵所以詰其武也弗馳弗驅則四鄰侮之矣夙興夜寐灑掃庭內所以無廢事也弗灑弗掃則門內無訾省矣琴瑟酒食燕樂嘉賓所以無遺賢也弗飲弗鼓則在位皆解體矣性嗇者愛及壺漿好儉者不事邊幅至於客坐生塵宫懸不設自謂減衣節口生殖日繁矣豈知死隨其後而終身勞攘卒為他人地耶揚之水序謂刺昭公也昭公分國以封沃沃盛強昭公微弱國人將叛而歸沃焉歐陽詩本義亦云揚之水其力弱以比昭公微弱不能制曲沃而桓叔之強於晉國如白石鑿鑿然見於水中其民樂而從之余竊以為不然其詩雖刺昭公實刺桓叔也桓叔之傾晉惟潘父欒賓之黨從之國人弗豫也其謀已泄微聞於晉晉之臣如師服者已知晉之不能久特昭公不知耳故其時深識逺慮之人如師服者作此詩以警桓叔蓋亦無謂秦無人意也其曰揚之水白石鑿鑿言見之審也水之渟畜者能鑑物激揚之水似無所見然水中之石鑿鑿然不能掩也桓叔之謀其可掩乎哉故終之曰我聞有命不敢以告人則直指而明言之矣既見君子云何不樂云何其憂不直言樂而言何不樂不直言不憂而言何其憂皆抑揚其辭以見意也人有異志容止改常見者必從而疑之而彼又忌人之疑之也故泄其謀者必不免則假為喜樂於桓叔之前詩人之所以免禍也然其情迫而其詞危矣昭公卒不悟所以見殺也若云民樂而從則將為諱之不暇而敢曰我聞有命乎曲沃篡晉晉人始終不豫及武公殺晉侯緡盡以其寶器賂周僖王王始命虢公命曲沃伯以一軍為晉侯晉人始不得已而從之故揚之水椒聊無衣悉是刺詩而序謂國人叛而歸沃君子見沃能修其政箋謂國人欲從桓叔歐陽謂其民樂而從之恐皆未有據也風之言王者五衛之詩曰王事敦我又曰為王前驅晉之詩曰王事靡盬秦之詩曰王於興師而終以曹之詩曰四國有王此編詩之微旨也然以事求之衛伯兮箋言宣公從王伐鄭於邶之北門則未有説然序於匏有苦葉曰刺宣公至新臺亦曰刺宣公則自匏有苦葉以至新臺皆宣公時也伐鄭之役邶人或與焉則北門與伯兮同是一時之詩以其地異而分繫之也晉之鴇羽在春秋前其事無所考然周桓公謂我周之東遷晉鄭焉依則文侯以後孝侯以前或亦有事於王室也秦無衣序不言秦何君而箋謂此責康公詩鄭蓋見前晨風詩為刺康公故亦以此為康公也然考康公之即位與晉戰者二與楚滅庸者一未嘗有事於王而詩曰王於興師曰與子偕行則實有其事矣按僖二十四年天王出居於鄭使簡師父告於晉左鄢父告於秦二十五年春秦伯師於河上將納王二十七年又與晉侯及諸侯會於溫天王因是狩於河陽此皆穆公時事疑此是穆公詩而不在黃鳥前或是編次之誤未可知也至下泉序謂共公共公於魯僖九年即位是時齊桓始霸挾天子以令諸侯凡齊桓會盟共公幾於無歲不往自晉文入曹之後終共公世不與會盟而曹遂自此不振宜其思王與郇伯也夏屋渠渠傳不詳注但云夏大也箋曰屋具也言君始於我厚設禮食大具以食我也王肅謂屋則立於先君食則受於今君朱子集傳頗用王説然以上下文理求之王説終未安也逸齋補傳謂左氏有酒如澠有肉如陵有酒如淮有肉如坻昔人尚以山川比飲食則况以夏屋不為過其言似是發明鄭意然未有證也按魯頌籩豆大房傳曰大房半體之爼也箋曰大房王飾爼也其制足間有橫下有柎似乎堂後有房然周語王公立飫則有房蒸注引頌詩謂半解其體升之於房則風之所謂夏屋即頌之所謂大房也以形似而比之房即可以形似而比之屋也苐大房則宗廟之祭房蒸則天子燕諸侯之禮非公所以食大夫者意秦國僻逺曾僭用是禮以饗大夫歟立飫之禮設几而不倚爵行而不飲非體解節折可共飲食或者其人始見之時特設是禮以優異之常食則否故下章曰每食四簋每食者常食也儀禮公食大夫設六簋彼言食於公此言食於家也東門之楊序謂婚姻失時女不從男也易大過九二枯楊生梯老夫得其女妻九五枯楊生華老婦得其士夫二五皆陽以楊象之則楊所以比男也春氣之動楊最先發所以比男先於女也然楊易生亦易老始而牂牂既而肺肺終則至於枯落故曰後時也衛懿公之滅也王室不能救而齊救之禮樂征伐自此不在天子故衛風以木瓜終木瓜即接王黍離此世道升降之會陳靈公之弒也中國不能討而楚討之禮樂征伐自此不在中國故風詩以澤陂終詩始周召見造周者二公也風終周公雅終召公見二公不作周不可為也春秋之能為周召者其惟孔子乎同我婦子勤稼穡也爰求柔桑修女紅也女心傷悲重婚姻也載纘武功教戰事也塞向瑾户居之安也采荼薪樗食之節也嗟我婦子幼有所長矣為此春酒老有所養矣入執宫功使民以時矣築場納稼萬物告成矣獻羔祭韭癘疾不降矣于是舉鄉飲而正齒位入學校而賓賢能彬彬乎王道之成矣詩説卷中
