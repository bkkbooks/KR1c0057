body:
  text: 詩説卷上密雲知縣惠周惕撰風雅頌以音别也雅有小大義不存乎小大也詩序之言曰雅者王政所由廢興政有小大故詩有小雅有大雅小大政之名立而辨難之端起矣難之者曰常武六月同一征伐也卷阿鹿鳴同一求賢也大小何以分耶解之者曰常武王自親征六月不過命將軍容不同故也卷阿為成王鹿鳴為文王天子諸侯尊卑有等故也難之者曰然則江漢宜在小雅成宣宜在大雅今何以或反之或錯陳之也其後朱晦翁則謂小雅燕饗之樂大雅朝會之樂受釐陳戒之辭嚴華谷則謂明白正大直言其事者雅之體純乎雅之體者為雅之大雜乎風之體者為雅之小章俊卿則謂風體語皆重復淺近婦人女子能道之雅則士君子為之也小雅非復風之體然亦間有重復未至渾厚大醇大雅則渾厚大醇矣三家之説朱氏於理為長然猶未離乎序之所謂政也序既以政為言則大小必有所指此辨難之所以紛紛也按樂記師乙曰廣大而靜疏達而信者宜歌大雅恭儉而好禮者宜歌小雅季札觀樂為之歌小雅曰美哉思而不二怨而不言為之歌大雅曰廣哉熙熙乎曲而有直體據此則大小二雅當以音樂别之不以政之小大論也如律有大小吕詩有大小明義不存乎小大也公羊傳曰什一而稅頌聲作序曰美盛德之形容以其成功告于神明者也然雅詩家父作頌以究王訩左傳聽輿人之頌原田每每舍其舊而新是謀刺亦可言頌矣國語瞽獻典史獻書師針瞍賦矇誦諫亦可言頌矣按禮學樂誦詩舞勺文王世子春誦夏弦孟子誦其詩讀其詩左傳使太師歌巧言之卒章太師辭師曹請為之遂誦之漢武帝定郊祀之禮乃立樂府采詩夜誦師古注曰夜誦者其言或祕不可宣露以是觀之比音曰歌舉其詞曰頌也豈宗廟之詩既歌之而復誦之歟抑歌者工而誦者又有工歟既比其音復誦其詞俾在位者皆知其義所以彰先王之盛德故曰頌至于所刺所諫欲聞其人之耳故亦曰頌也樂記曰清廟之瑟朱弦而疏越一倡而三嘆又曰君子於是語於是道古豈即頌之義也歟鄭氏頌譜頌訓為容蓋漢讀然也漢書儒林傳徐生善為頌師古注頌讀與容同是也孔氏正義頌之言誦也誦今之德廣以美之是誦即頌也正變之説出于大序而文中子取以説豳風其後諸儒皆從之鄭漁仲始倡風雅無正變之論而葉氏見段氏程氏集説章氏因之二者反覆莫能相一以余觀之正變猶美刺也詩有美不能無刺故有正不能無變以其略言之如美衛武美鄭武美周公美宣王刺衛宣刺鄭莊刺時刺亂刺宣王刺幽厲此顯言美刺者也如莊薑傷已閔無臣思周道大夫閔時衛女思歸思君子南征復古此隱言美刺者也美者可以為勸刺者可以為懲故正變俱録之編詩先後因乎時代故正變錯陳之若謂詩無正變則作詩無美刺之分不可也謂周召為正十三國風為變鹿鳴以下為正六月以下為變文王以下為正民勞以下為變則序所謂美與刺者俱無以處之亦不可也胡氏春秋集傳曰孟子曰王者之迹熄而詩亡詩亡然後春秋作蓋自黍離降為國風天下無復有雅而王者之詩亡矣春秋作于隱公適當雅亡之後謂詩亡者雅詩亡也夫詩必雅而後為詩則周召十三國風不得謂之詩歟雅有美刺而風亦有美刺雅有諷諭而風亦有諷諭安在風不如雅無與於詩亡之數也即曰十三國風朝會燕享不歌其詩而二南則鄉飲用之鄉射用之房中用之安在風不如雅無與於詩亡之數也茍風與雅同謂之詩則風詩中多春秋時事而孟子謂之詩亡然後春秋作其合雅與風言之無疑矣按小雅六月序曰小雅盡廢則中國微則雅亡于幽厲矣列國之詩終於株林澤陂則風亡於陳靈矣陳氏曰檜亡東周之始也曹亡春秋之終也於檜之卒章曰思周道也傷天下之無王也於曹之卒章曰思治也傷天下之無霸也合而觀之雅之亡亡於無王風之亡亡於無霸雅亡而風存人猶知是非美刺也逮風雅俱亡而詩遂掃地盡矣此春秋所以不得不作也孟子曰其事則齊桓晉文齊晉者春秋之始終也宣公十一年冬楚子入陳明年六月遂有邲之戰是時楚莊始霸而晉始衰未及十年成公會楚公子嬰齊於蜀又及楚盟天下政枋自此盡失不可復挽故風所以終陳靈也詩之所以亡孟子固微言之人特習而不察耳周禮大師教六詩曰風曰賦曰比曰興曰雅曰頌大序引以為説蓋風雅頌者詩之名也興比賦者詩之體也名不可亂故雅頌各有其所體不可偏舉故興比賦合而後成詩自三百篇以至漢唐其體猶是也毛公傳詩獨言興不言比賦以興兼比賦也人之心思必觸于物而後興即所興以為比而賦之故言興而比賦在其中毛氏之意未始不然也然三百篇惟狡童褰裳株林清廟之類直指其事不假比興其餘篇篇有之傳獨於詩之山川草木鳥獸起句者始謂之興則幾于偏矣詩或先興而後賦或先賦而後興如簡兮至卒章始云山有榛隰有苓之類是也見其篇法錯綜變化之妙毛氏獨以首章發端者為興則又拘于法矣文公傳詩又以興比賦分而為三無乃失之愈逺乎文心雕龍曰毛公述傳獨標興體以比顯而興隱鶴林吳氏曰賦直而興微比顯而興隱故毛公不稱比賦朱氏又於其間增補十九篇而摘其不合于興者四十八條且曰關雎興詩也而兼于比緑兮一詩比也而兼于興頍辨一詩興比賦兼之則析義愈精恐未然也二南二十二篇皆述太姒之事然一太姒也何以為后妃何以為夫人一文王也何以為王者何以為諸侯或曰文王於商為諸侯及受命追王則為王者太姒亦然時有先後故也然追王後於諸侯則周南宜後於召南矣有是理乎昔者歐陽公嘗疑之而不得其解因取魯詩衰周之説以為近之而朱子謂子孫無故播其先祖之失於理未安然于后妃夫人終仍舊説而未有所發明也按小序曰關雎后妃之德也葛覃后妃之本也卷耳后妃之志也云云未嘗指言后妃夫人為何如人後之訓詁家推迹其自始以為太姒耳儀禮鄉飲酒鄉射皆合樂周南關雎葛覃卷耳鵲巢采蘩采蘋燕禮弦歌周南召南之詩則周公作儀禮時已有周南召南豈公作之而被之管弦歟抑公采之而付之大師歟既謂房中之樂則必歌之宴寢之間鄭氏所謂后夫人所諷誦以事其君子者也今讀其詞有勸勉教誡諷諭之意蓋欲為后妃夫人者如詩言云爾不必言后妃夫人何人也小雅鹿鳴燕羣臣四牡勞使臣常棣燕兄弟伐木燕朋友何嘗謂如何羣臣如何兄弟使臣朋友耶古之燕享皆有樂樂必有詩歌詩必類二雅如此者極多何風獨不然也難者曰然則周南召南與文王太姒無與耶曰不然也作詩之意或本于文王太姒而周公𨽻之為房中樂則又以是告後之為后妃夫人者矣周自薑嫄兆祥至太王有薑女王季有太任文王有太姒纍世婦德至太姒而始大而文王又有刑于寡妻之詩故説者據是為文王耳其實不可考矣若泥是求之則歐陽所謂鄭譜之説左右皆不能合者也或問曰鄭謂文王受命作邑於豐乃分岐周地為周公旦召公奭之采邑是為周南召南其説然歟曰非也二公之封在武王克殷之後樂記所謂三成而南四成而南國是疆五成而分周公左召公右是也史記魯燕世家載封國始末不言文王惟江漢四章有文王受命召公維翰之語鄭或據是以為文王然以召南言之甘棠三章三詠召伯當是時文王已為西伯矣而復命召奭是一國而二伯也且吾不知命之者為商紂耶為文王耶揆之二者俱未安是以知鄭説之非也然則二南何以言文王曰此追詠其事而歸美焉兼取當時國人之所作而繫之所謂善則歸君臣子之義也且微獨二南而已豳七月八章舊謂詠后稷先公時事未嘗以是為后稷先公之詩而二南獨謂之文王何也魯之無風也鄭曰周尊魯故巡狩述職不陳其詩其果然者耶幽厲以後王者不巡狩久矣十三國風誰采而誰録之耶天子賞罰視其詩之貞淫天子尊魯何妨采其詩之貞者以示異于天下乃併其美而掩蔽之安在其尊魯耶縱天子不采魯亦不當自廢何季札觀樂遍及諸國而魯乃寂無歌詩又何耶魯之有頌也鄭曰孔子録之同於王者之後蓋言褒也朱子曰著之於篇所以見其僭蓋言貶也是皆泥風為諸侯之詩雅頌為天子之詩故致論説之紛紛也余聞之師曰類藁詩問十五國之中有二南是天子之詩也雅頌之中小雅有賓之初筵大雅有抑頌有魯是皆諸侯之詩也不得以風詩專屬之諸侯雅頌專屬之天子也足以破衆説之紛紛矣詩説卷上
