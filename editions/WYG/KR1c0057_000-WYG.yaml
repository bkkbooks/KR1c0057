body:
  text: 詩説詩類提要臣等謹案詩説三卷國朝恵周惕撰周惕字元龍長洲人康熙辛未進士改庶吉士散館授密雲縣知縣恵氏三世以經學著周惕其剏始者也是書于毛傳鄭箋朱傳無所專主多自以己意考證其大㫖謂大小雅以音别不以政别謂正雅變雅美刺錯陳不必分六月以上為正六月以下為變文王以下為正民勞以下為變謂二南二十六篇皆擬為房中之樂不必泥其所指何人謂周召之分鄭箋誤以為文王謂天子諸侯均得有頌魯頌非僭其言皆有依據至謂頌兼美刺義通于誦則其説未安考鄭康成注儀禮正歌備句曰正歌者升歌及笙各三終合樂三終為一備核以經文無歌後更誦及一歌一誦之節其周禮瞽曚職曰諷誦詩鄭注謂闇讀之不依永也則歌誦是兩事知頌誦亦為兩事周惕合之非矣又謂證以國䇿禮無歸寧之文訓歸寧父母為無父母遺罹之義考歸寧文見左傳于禮經必有所承何休注公羊傳稱諸侯夫人尊重既嫁非有大故不得反惟士大夫妻雖無事嵗一歸寧其學亦必有所受曲禮曰女子許嫁纓非有大故不入其門姑姊妹女子已嫁而反兄弟弗與同席而坐弗與同器而食其文承上許嫁而言則已嫁而反是即歸寧之明證不得曰禮無文矣然其餘類皆引据􅃀實樹義深切與枵腹説經徒以臆見決是非者固有殊焉乾隆四十六年正月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:fbe5c22eb618179fd908465f54f981e65874fd36d64f198cfe558d5309de63fb
